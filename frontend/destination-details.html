<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/hotels.css">
    
    <style>
        /* --- KEEPING YOUR ORIGINAL UI STYLES --- */
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        .hero { height: 350px; background: #222; position: relative; overflow: hidden; }
        .hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hero-content { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); text-align: center; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.7); width: 90%; }
        .hero h1 { margin: 0; font-size: 3.5rem; letter-spacing: 1px; }
        .hero p { font-size: 1.2rem; margin-top: 5px; opacity: 0.9; }
        .container { max-width: 1100px; margin: -50px auto 40px; padding: 20px; position: relative; z-index: 10; }
        .back-btn { display: inline-block; background: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; color: #333; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; transition: transform 0.2s; }
        .back-btn:hover { transform: translateY(-2px); }
        .section-title { font-size: 1.5rem; color: #0b74e7; margin: 40px 0 20px; border-left: 5px solid #0b74e7; padding-left: 15px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .card-img { height: 160px; background: #ddd; display: flex; align-items: center; justify-content: center; color: #777; font-size: 3rem; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 20px; flex-grow: 1; }
        .card h4 { margin: 0 0 8px; color: #222; font-size: 1.1rem; }
        .card p { margin: 0; font-size: 0.9rem; color: #666; line-height: 1.5; }
        .card-badge { display: inline-block; font-size: 0.75rem; background: #e3f2fd; color: #0b74e7; padding: 4px 8px; border-radius: 4px; margin-bottom: 10px; font-weight: 600; }
        .book-btn { background: #0b74e7; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 15px; width: 100%; transition: background 0.3s; }
        .book-btn:hover { background: #085bb5; }
        .loading { text-align: center; padding: 40px; color: #777; font-size: 1.1rem; }
        /* ADDED: Error Messaging & Animations */
        .error-msg {color: #ff4d4d;font-size: 0.75rem; margin-top: 4px; display: none; /* Hidden by default */}
        .input-error {border-color: #ff4d4d !important; animation: shake 0.4s ease-in-out;}
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <img id="cityImg" src="https://source.unsplash.com/1600x900/?travel" alt="City">
        <div class="hero-content">
            <h1 id="cityName">Loading...</h1>
            <p>Explore the best stays and sights</p>
        </div>
    </div>

    <div class="container">
        <a href="index.html" class="back-btn">← Back to Home</a>
        
        <h2 class="section-title">🏨 Top Hotels Nearby</h2>
        <div id="hotel-list" class="grid">
            <div class="loading">Loading hotels...</div>
        </div>

        <h2 class="section-title">🎡 Tourist Attractions</h2>
        <div id="attraction-list" class="grid">
            <div class="loading">Loading attractions...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfP1XaMtkGuBeSrl4fRw-Zi3l7_5sPm_w",
            authDomain: "packnplan-3312d.firebaseapp.com",
            projectId: "packnplan-3312d",
            storageBucket: "packnplan-3312d.firebasestorage.app",
            messagingSenderId: "976654836537",
            appId: "1:976654836537:web:4d9b292611ccd5328b3ee8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const API_KEY = "1158d45a31c54d4fa492f618703b1f7f"; 
        const params = new URLSearchParams(window.location.search);
        const city = params.get("city");
        const heroImage = params.get("hero");

        if(city) {
            document.getElementById("cityName").innerText = city;
            document.getElementById("cityImg").src = heroImage && heroImage !== "undefined" ? decodeURIComponent(heroImage) : `https://loremflickr.com/1600/900/${city},travel/all`;
            fetchData(city);
        }

        async function fetchData(cityName) {
            try {
                const geoUrl = `https://api.geoapify.com/v1/geocode/search?text=${cityName}&apiKey=${API_KEY}`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();
                if(!geoData.features?.length) return;
                const { lat, lon } = geoData.features[0].properties;

                getPlaces(lat, lon, "accommodation", "hotel-list", "Stay");
                getPlaces(lat, lon, "tourism.attraction", "attraction-list", "Attraction");
            } catch (e) { console.error(e); }
        }

        async function getPlaces(lat, lon, category, containerId, typeLabel) {
            const url = `https://api.geoapify.com/v2/places?categories=${category}&filter=circle:${lon},${lat},50000&limit=15&apiKey=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            const container = document.getElementById(containerId);
            container.innerHTML = ""; 

            data.features?.forEach(place => {
                const props = place.properties;
                if(props.name) {
                    const randomPrice = Math.floor(Math.random() * (8000 - 3000) + 3000);
                    const card = document.createElement("div");
                    card.className = "card";

                    // Use a stable unique image per place to avoid repetition
                    const placeSlug = (props.name || `${typeLabel}-${Math.random()}`).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                    const seed = `${typeLabel}-${placeSlug}`;
                    const imageSource = `https://picsum.photos/seed/${encodeURIComponent(seed)}/300/200`;

                    card.innerHTML = `
                        <div class="card-img">
                            <img src="${imageSource}"
                                 alt="${props.name}"
                                 loading="lazy"
                                 onerror="this.onerror=null; this.src='https://via.placeholder.com/300x200?text=Image+not+available';" />
                        </div>
                        <div class="card-body">
                            <span class="card-badge">${typeLabel}</span>
                            <h4>${props.name}</h4>
                            <p>📍 ${props.address_line2 || "Address unavailable"}</p>
                            <button class="book-btn">Book ${typeLabel}</button>
                        </div>`;
                    
                    // MODIFIED: Button now redirects to booking page instead of modal
                    card.querySelector(".book-btn").onclick = () => {
                        const params = new URLSearchParams({
                            hotelName: props.name,
                            address: props.address_line2 || city,
                            price: randomPrice,
                            city: city,
                            checkIn: "As per availability",
                            checkOut: "As per availability", 
                            guests: "1 Guest",
                            itemType: typeLabel
                        });
                        window.location.href = `booking.html?${params.toString()}`;
                    };
                    container.appendChild(card);
                }
            });
        }

        // --- REMOVED: Modal functions - now using unified booking flow ---
    </script>
</body>
</html>
