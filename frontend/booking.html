<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack & Plan — Booking Details</title>
    <link rel="stylesheet" href="assets/css/hotels.css">
</head>
<body>
    <header class="hotel-header">
        <button onclick="window.location.href='hotels.html'" class="back-btn">← Back to Hotels</button>
        <h1>Complete Your Booking</h1>
    </header>

    <main class="container">
        <div class="booking-form-container">
            <div id="hotelSummary" class="hotel-summary">
                <h2 id="hotelName">Hotel Name</h2>
                <p id="hotelAddress">Address</p>
                <div class="price-summary">
                    <span>Price per night: ₹<span id="pricePerNight">0</span></span>
                </div>
            </div>

            <div id="transportSummary" class="hotel-summary" style="display:none;">
                <h2 id="transportTitle">Transport Booking</h2>
                <p id="transportRoute">From - To</p>
                <div class="price-summary">
                    <span>Price per ticket: ₹<span id="pricePerTicket">0</span></span>
                </div>
            </div>

            <form id="bookingForm" class="booking-form">
                <div class="form-section">
                    <h3>Passenger Details</h3>
                    <div class="input-block">
                        <label>Lead Passenger Name</label>
                        <input type="text" id="guestName" required>
                    </div>
                    <div class="input-block">
                        <label>Email Address</label>
                        <input type="email" id="guestEmail" required>
                    </div>
                    <div class="input-block">
                        <label>Phone Number</label>
                        <div class="phone-input-wrapper">
                            <span class="country-code">+91</span>
                            <input type="text" id="guestPhone" inputmode="numeric" maxlength="10" required>
                        </div>
                    </div>
                </div>

                <div id="hotelDetails" class="form-section">
                    <h3>Hotel Booking Details</h3>
                    <div class="input-block">
                        <label>Number of Travelers</label>
                        <input type="number" id="travelers" min="1" value="2" required>
                    </div>
                    <div class="input-block">
                        <label>Number of Nights</label>
                        <input type="number" id="nights" min="1" value="1" required>
                    </div>
                    <div class="input-block">
                        <button id="addHotelTravelerBtn" type="button" class="btn-primary-small">Add Hotel Guest</button>
                    </div>
                    <div id="hotelTravelerFormsContainer" class="traveler-forms"></div>
                </div>

                <div id="transportDetails" class="form-section" style="display:none;">
                    <h3>Transport Booking Details</h3>
                    <div class="input-block">
                        <label>Number of Travelers</label>
                        <input type="number" id="transportTravelers" min="1" value="1" required>
                    </div>
                    <div class="input-block">
                        <button id="addTravelerBtn" type="button" class="btn-primary-small">Add Traveler</button>
                    </div>
                    <div id="travelerFormsContainer" class="traveler-forms"></div>

                    <div class="input-block">
                        <label>Travel Date</label>
                        <input type="text" id="travelDate" placeholder="Select travel date" onfocus="(this.type='date')" required>
                    </div>

                    <div id="busCabOptions" class="form-section" style="display:none;">
                        <div class="input-block">
                            <label>Pickup Location</label>
                            <input type="text" id="pickupLoc" placeholder="Pickup point">
                        </div>
                        <div class="input-block">
                            <label>Drop Location</label>
                            <input type="text" id="dropLoc" placeholder="Drop point">
                        </div>
                        <div class="input-block">
                            <label>Travel Time</label>
                            <input type="time" id="travelTime">
                        </div>
                    </div>
                </div>

                <div class="booking-summary">
                    <h3>Booking Summary</h3>
                    <div class="summary-item">
                        <span>Item:</span>
                        <span id="summaryItem">N/A</span>
                    </div>
                    <div class="summary-item" id="summaryGuestsBlock">
                        <span>Travelers:</span>
                        <span id="summaryTravelers">1</span>
                    </div>
                    <div class="summary-item" id="summaryNightsBlock">
                        <span>Nights:</span>
                        <span id="summaryNights">1</span>
                    </div>
                    <div class="summary-item total">
                        <span>Total Amount:</span>
                        <span id="totalAmount">₹0</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary-large">Proceed to Payment</button>
            </form>
        </div>
    </main>

    <script type="module" src="assets/js/booking.js"></script>
</body>
</html>
