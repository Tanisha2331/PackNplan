<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack & Plan — Book Hotels</title>
    <link rel="stylesheet" href="assets/css/hotels.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <header class="hotel-header">
        <button onclick="window.location.href='index.html'" class="back-btn">← Back to home</button>
        <h1 id="headerCity">Find a Place to Stay</h1>
    </header>

    <main class="container">
        <div id="hotelGrid" class="hotel-grid">
            <div class="loader">Searching for the best stays... 🏨</div>
        </div>
    </main>

    <div id="bookingModal" class="modal hidden">
        <div class="modal-content premium-modal" id="modalMainContent">
            <div class="modal-header-main">
                <h2 id="modalHotelName">Hotel Name</h2>
                <p id="modalHotelAddress" class="sub-address">📍 Loading address...</p>
            </div>

            <div class="modal-body-scroll">
                <div class="trip-summary-card">
                    <div class="summary-item">
                        <span class="label">CHECK-IN</span>
                        <span id="summaryCheckIn" class="value">--/--/----</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-item">
                        <span class="label">GUESTS</span>
                        <span id="summaryGuests" class="value">2 Guests</span>
                    </div>
                </div>

                <div id="step1" class="booking-form">
                    <div class="input-block">
                        <label>Guest Full Name</label>
                        <input type="text" id="guestName" placeholder="e.g. John Doe">
                    </div>

                    <div class="input-block">
                        <label>Email Address</label>
                        <input type="email" id="guestEmail" placeholder="name@example.com">
                    </div>

                    <div class="input-block">
                        <label>Phone Number</label>
                        <div class="phone-input-wrapper">
                            <span class="country-code">+91</span>
                            <input type="text" id="guestPhone" inputmode="numeric" maxlength="10" placeholder="00000 00000">
                        </div>
                    </div>

                    <button id="goToPayment" class="btn-primary-large">Proceed to Secure Payment</button>
                    <button id="closeModal" class="btn-link-cancel">Cancel Booking</button>
                </div>

                <div id="step2" class="booking-form hidden">
                    <div style="background: var(--bg-summary); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px dashed var(--accent);">
                        <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">AMOUNT TO PAY:</span>
                        <strong id="payAmount" style="font-size: 1.2rem; color: var(--accent);">₹0</strong>
                    </div>

                    <div class="input-block">
                        <label>Card Number</label>
                        <input type="text" placeholder="xxxx xxxx xxxx xxxx" maxlength="19">
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 5px;">Expiry</label>
                            <input type="text" placeholder="MM/YY" maxlength="5" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-clr);">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 5px;">CVV</label>
                            <input type="password" placeholder="***" maxlength="3" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-clr);">
                        </div>
                    </div>

                    <button id="confirmFinalBooking" class="btn-primary-large">Pay & Confirm Booking</button>
                    <button id="backToStep1" class="btn-link-cancel">← Back to Details</button>
                </div>
            </div>
        </div>
    </div>

    <div id="myBookingsModal" class="modal hidden">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Your Trips 🎒</h2>
                <button onclick="document.getElementById('myBookingsModal').classList.add('hidden')">&times;</button>
            </div>
            <div id="bookingsList"></div>
        </div>
    </div>
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
    <script type="module" src="assets/js/hotels.js"></script>
</body>
</html>
