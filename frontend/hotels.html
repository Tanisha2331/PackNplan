<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack & Plan — Book Hotels</title>
    <link rel="stylesheet" href="assets/css/hotels.css">
</head>
<body>
    <header class="hotel-header">
        <button onclick="window.location.href='index.html'" class="back-btn">← Back to home</button>
        <h1 id="headerCity">Find a Place to Stay</h1>
    </header>

    <main class="container">
        <div id="hotelGrid" class="hotel-grid">
            <div class="loader">Searching for the best stays... 🏨</div>
        </div>
    </main>

    <div id="myBookingsModal" class="modal hidden">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Your Trips 🎒</h2>
                <button onclick="document.getElementById('myBookingsModal').classList.add('hidden')">&times;</button>
            </div>
            <div id="bookingsList"></div>
        </div>
    </div>
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
    <script type="module" src="assets/js/hotels.js"></script>
</body>
</html>
